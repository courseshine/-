<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹贪吃蛇 - NEON SNAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(ellipse at 30% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 50%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.grid-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
}

.game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
}

.title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #00f0ff, #a855f7, #ff00e4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.3));
}

.title-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(0, 240, 255, 0.4);
    margin-top: -12px;
}

.score-bar {
    display: flex;
    gap: 16px;
    width: 100%;
}

.score-box {
    flex: 1;
    background: rgba(13, 13, 36, 0.8);
    border: 1px solid rgba(0, 240, 255, 0.15);
    border-radius: 6px;
    padding: 10px 14px;
    text-align: center;
    backdrop-filter: blur(10px);
}

.score-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0, 240, 255, 0.5);
}

.score-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #00f0ff;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    line-height: 1.2;
}

.score-value.high {
    color: #a855f7;
    text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
}

.board-panel {
    position: relative;
    border: 2px solid rgba(0, 240, 255, 0.3);
    border-radius: 8px;
    box-shadow:
        0 0 30px rgba(0, 240, 255, 0.08),
        inset 0 0 30px rgba(0, 240, 255, 0.02);
    overflow: hidden;
}

canvas#gameCanvas {
    display: block;
    background: #0d0d24;
    border-radius: 6px;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 20, 0.88);
    backdrop-filter: blur(6px);
    border-radius: 6px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

.overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 6px;
    margin-bottom: 10px;
    color: #ef4444;
    text-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
}

.overlay-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    color: rgba(224, 224, 255, 0.7);
    margin-bottom: 2px;
    letter-spacing: 2px;
}

.overlay-score span {
    color: #00f0ff;
    font-size: 20px;
    text-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
}

.overlay-high {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: rgba(168, 85, 247, 0.6);
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.overlay-high span {
    color: #a855f7;
    font-weight: 600;
}

.restart-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 10px 28px;
    background: transparent;
    color: #00f0ff;
    border: 2px solid rgba(0, 240, 255, 0.4);
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
}

.restart-btn:hover {
    background: rgba(0, 240, 255, 0.1);
    border-color: #00f0ff;
    box-shadow: 0 0 25px rgba(0, 240, 255, 0.2);
    transform: translateY(-1px);
}

.controls-hint {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: rgba(0, 240, 255, 0.3);
    letter-spacing: 3px;
    margin-top: 4px;
}

.controls-hint span {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    padding: 2px 6px;
    border: 1px solid rgba(0, 240, 255, 0.15);
    border-radius: 3px;
    color: rgba(0, 240, 255, 0.5);
    margin: 0 2px;
}
</style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="game-wrapper">
    <div class="title">NEON SNAKE</div>
    <div class="title-sub">霓 虹 贪 吃 蛇</div>

    <div class="score-bar">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">High Score</div>
            <div class="score-value high" id="highDisplay">0</div>
        </div>
    </div>

    <div class="board-panel">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay" id="gameOverOverlay">
            <div class="overlay-title">GAME OVER</div>
            <div class="overlay-score">最终得分 <span id="finalScore">0</span></div>
            <div class="overlay-high">最高纪录 <span id="finalHigh">0</span></div>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <div class="controls-hint">
        <span>←</span> <span>↑</span> <span>↓</span> <span>→</span> 方向键控制
    </div>
</div>

<script>
const ROWS = 20;
const COLS = 20;
const CELL = 26;
const GAP = 1;
const PAD = 10;
const BOARD_W = COLS * CELL + (COLS - 1) * GAP + PAD * 2;
const BOARD_H = ROWS * CELL + (ROWS - 1) * GAP + PAD * 2;

const HEAD_COLOR = { main: '#00f0ff', glow: 'rgba(0,240,255,0.7)', dark: '#0099a3' };
const BODY_COLORS = ['#a855f7', '#818cf8', '#22d3ee', '#00f0ff'];
const FOOD_COLOR = { main: '#ef4444', glow: 'rgba(239,68,68,0.6)' };
const TRAIL_COLORS = ['rgba(168,85,247', 'rgba(129,140,248', 'rgba(34,211,238', 'rgba(0,240,255'];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = BOARD_W;
canvas.height = BOARD_H;

let snake = [];
let direction = 'right';
let nextDirection = 'right';
let food = null;
let score = 0;
let highScore = parseInt(localStorage.getItem('neonSnakeHigh') || '0');
let gameState = 'playing';
let speed = 150;
let moveTimer = 0;
let trails = [];
let foodPulse = 0;
let lastTime = 0;
let ateCount = 0;
let pendingGrowth = 0;

document.getElementById('highDisplay').textContent = highScore.toLocaleString();

function initSnake() {
    snake = [];
    for (let i = 2; i >= 0; i--) {
        snake.push({ x: 5 + i, y: 10 });
    }
    direction = 'right';
    nextDirection = 'right';
}

function spawnFood() {
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    const empty = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!occupied.has(`${c},${r}`)) empty.push({ x: c, y: r });
        }
    }
    if (empty.length === 0) return false;
    food = empty[Math.floor(Math.random() * empty.length)];
    return true;
}

function update() {
    if (gameState !== 'playing') return;

    direction = nextDirection;

    const head = { ...snake[0] };
    if (direction === 'up') head.y--;
    if (direction === 'down') head.y++;
    if (direction === 'left') head.x--;
    if (direction === 'right') head.x++;

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        gameOver();
        return;
    }

    const ate = food && head.x === food.x && head.y === food.y;

    if (!ate) {
        const tail = snake.pop();
        trails.push({
            x: tail.x, y: tail.y,
            opacity: 0.6,
            colorIdx: Math.floor(Math.random() * TRAIL_COLORS.length),
            size: 1
        });
    }

    for (let i = 0; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if (ate) {
        score += 10;
        ateCount++;
        document.getElementById('scoreDisplay').textContent = score.toLocaleString();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('neonSnakeHigh', highScore.toString());
            document.getElementById('highDisplay').textContent = highScore.toLocaleString();
        }
        if (ateCount % 5 === 0) {
            speed = Math.max(80, speed - 30);
        }
        trails.push({
            x: head.x, y: head.y,
            opacity: 0.8,
            colorIdx: Math.floor(Math.random() * TRAIL_COLORS.length),
            size: 1
        });
        if (!spawnFood()) {
            gameOver();
            return;
        }
        spawnEatParticles(head.x, head.y);
    }
}

function spawnEatParticles(gx, gy) {
    const cx = PAD + gx * (CELL + GAP) + CELL / 2;
    const cy = PAD + gy * (CELL + GAP) + CELL / 2;
    for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed2 = 1.5 + Math.random() * 3;
        eatParticles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed2,
            vy: Math.sin(angle) * speed2,
            life: 1,
            decay: 0.02 + Math.random() * 0.015,
            size: 2 + Math.random() * 3,
            color: ['#ef4444', '#f97316', '#ffe600'][Math.floor(Math.random() * 3)]
        });
    }
}

let eatParticles = [];

function updateParticles() {
    for (let i = eatParticles.length - 1; i >= 0; i--) {
        const p = eatParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.vx *= 0.97;
        p.life -= p.decay;
        if (p.life <= 0) eatParticles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of eatParticles) {
        ctx.globalAlpha = p.life;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.5 + p.life * 0.5), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
}

function gameOver() {
    gameState = 'gameover';
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('neonSnakeHigh', highScore.toString());
    }
    document.getElementById('finalScore').textContent = score.toLocaleString();
    document.getElementById('finalHigh').textContent = highScore.toLocaleString();
    document.getElementById('gameOverOverlay').classList.add('active');
}

function restart() {
    document.getElementById('gameOverOverlay').classList.remove('active');
    gameState = 'playing';
    score = 0;
    ateCount = 0;
    speed = 150;
    eatParticles = [];
    trails = [];
    moveTimer = 0;
    document.getElementById('scoreDisplay').textContent = '0';
    initSnake();
    spawnFood();
}

function updateTrails() {
    for (let i = trails.length - 1; i >= 0; i--) {
        trails[i].opacity -= 0.025;
        trails[i].size += 0.02;
        if (trails[i].opacity <= 0) {
            trails.splice(i, 1);
        }
    }
}

function drawBoard() {
    ctx.fillStyle = '#0d0d24';
    ctx.fillRect(0, 0, BOARD_W, BOARD_H);

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = PAD + c * (CELL + GAP);
            const y = PAD + r * (CELL + GAP);
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            ctx.beginPath();
            ctx.roundRect(x, y, CELL, CELL, 3);
            ctx.fill();
        }
    }

    const gridColor = Math.sin(Date.now() / 2000) * 0.01 + 0.03;
    ctx.strokeStyle = `rgba(0, 240, 255, ${gridColor})`;
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(PAD + c * (CELL + GAP) - GAP / 2, PAD - GAP / 2);
        ctx.lineTo(PAD + c * (CELL + GAP) - GAP / 2, PAD + ROWS * (CELL + GAP) - GAP / 2);
        ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(PAD - GAP / 2, PAD + r * (CELL + GAP) - GAP / 2);
        ctx.lineTo(PAD + COLS * (CELL + GAP) - GAP / 2, PAD + r * (CELL + GAP) - GAP / 2);
        ctx.stroke();
    }
}

function drawTrails() {
    for (const t of trails) {
        const x = PAD + t.x * (CELL + GAP);
        const y = PAD + t.y * (CELL + GAP);
        const color = TRAIL_COLORS[t.colorIdx % TRAIL_COLORS.length];
        const spread = (t.size - 1) * 3;
        ctx.globalAlpha = t.opacity * 0.3;
        ctx.shadowColor = color + ',0.2)';
        ctx.shadowBlur = 6;
        ctx.fillStyle = color + `,${t.opacity * 0.2})`;
        ctx.beginPath();
        ctx.roundRect(x - spread, y - spread, CELL + spread * 2, CELL + spread * 2, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }
}

function drawFood() {
    if (!food) return;
    const x = PAD + food.x * (CELL + GAP);
    const y = PAD + food.y * (CELL + GAP);
    foodPulse += 0.04;
    const pulse = Math.sin(foodPulse) * 0.15 + 1;
    const cx = x + CELL / 2;
    const cy = y + CELL / 2;
    const r = CELL / 2 * pulse;

    ctx.shadowColor = FOOD_COLOR.glow;
    ctx.shadowBlur = 15;
    ctx.fillStyle = FOOD_COLOR.main;
    ctx.beginPath();
    ctx.arc(cx, cy, r - 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(cx - r * 0.2, cy - r * 0.2, r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawSnake() {
    for (let i = snake.length - 1; i >= 0; i--) {
        const seg = snake[i];
        const x = PAD + seg.x * (CELL + GAP);
        const y = PAD + seg.y * (CELL + GAP);
        const progress = i / Math.max(snake.length - 1, 1);
        const isHead = i === 0;

        let color;
        if (isHead) {
            color = HEAD_COLOR;
        } else {
            const ci = Math.floor(progress * (BODY_COLORS.length - 1));
            const cf = progress * (BODY_COLORS.length - 1) - ci;
            const c1 = BODY_COLORS[Math.min(ci, BODY_COLORS.length - 1)];
            const c2 = BODY_COLORS[Math.min(ci + 1, BODY_COLORS.length - 1)];
            color = {
                main: c1,
                glow: c1.replace(')', ',0.4)').replace('rgb', 'rgba'),
                dark: c2
            };
        }

        const grad = ctx.createLinearGradient(x, y, x + CELL, y + CELL);
        grad.addColorStop(0, isHead ? '#66f5ff' : color.main);
        grad.addColorStop(0.5, color.main);
        grad.addColorStop(1, isHead ? '#0099a3' : (color.dark || color.main));

        ctx.shadowColor = isHead ? HEAD_COLOR.glow : (color.glow || 'rgba(0,240,255,0.2)');
        ctx.shadowBlur = isHead ? 15 : 8;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, CELL, CELL, isHead ? 5 : 3);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (isHead) {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(x + CELL * 0.3, y + CELL * 0.3, CELL * 0.12, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function draw() {
    drawBoard();
    drawTrails();
    drawFood();
    drawSnake();
    drawParticles();
}

function gameLoop(time = 0) {
    const delta = time - lastTime;
    lastTime = time;

    if (gameState === 'playing') {
        moveTimer += delta;
        if (moveTimer >= speed) {
            moveTimer -= speed;
            update();
        }
    }

    updateTrails();
    updateParticles();

    draw();
    requestAnimationFrame(gameLoop);
}

function init() {
    initSnake();
    spawnFood();
    gameLoop();

    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
            e.preventDefault();
            if (gameState !== 'playing') return;
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
            const nd = map[key];
            if (nd && nd !== opposites[direction]) {
                nextDirection = nd;
            }
        }
    });

    document.getElementById('restartBtn').addEventListener('click', restart);
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (r > w / 2) r = w / 2;
        if (r > h / 2) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
        return this;
    };
}

init();
</script>
</body>
</html>
